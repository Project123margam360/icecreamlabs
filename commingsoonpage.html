<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICE CREAM LABS | Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream-0: #fffefd;
      --cream-1: #f6f7f9;
      --cream-2: #eceff4;
      --ink: #173244;
      --ink-soft: rgba(23, 50, 68, 0.62);
      --brand-blue: #28a4d8;
      --brand-pink: #ea5b97;
      --line: rgba(40, 164, 216, 0.3);
      --glow-blue: rgba(108, 206, 245, 0.45);
      --glow-pink: rgba(236, 120, 171, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI Variable", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(140% 90% at 50% 8%, #ffffff 0%, #f4f9fc 50%, #eaf0f6 100%);
      color: var(--ink);
      position: relative;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .screen {
      width: 1920px;
      height: 1080px;
      position: absolute;
      left: 0;
      top: 0;
      display: grid;
      place-items: center;
      isolation: isolate;
      transform-origin: top left;
      background:
        radial-gradient(62% 40% at 50% 16%, rgba(116, 211, 244, 0.72) 0%, rgba(169, 228, 247, 0.24) 52%, rgba(199, 237, 250, 0) 100%),
        radial-gradient(36% 28% at 74% 24%, rgba(244, 132, 188, 0.48) 0%, rgba(244, 170, 205, 0.12) 58%, rgba(244, 170, 205, 0) 100%),
        radial-gradient(30% 22% at 28% 72%, rgba(123, 200, 237, 0.34) 0%, rgba(123, 200, 237, 0) 100%),
        linear-gradient(165deg, var(--cream-0) 0%, var(--cream-1) 52%, var(--cream-2) 100%);
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.11)),
        repeating-linear-gradient(
          45deg,
          rgba(40, 164, 216, 0.02) 0,
          rgba(40, 164, 216, 0.02) 1px,
          transparent 1px,
          transparent 5px
        );
      opacity: 0.7;
      z-index: 0;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 52%, rgba(15, 39, 59, 0.22) 100%);
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 3;
      text-align: center;
      width: 1520px;
      max-width: 84%;
      padding: 22px;
      animation: contentFloat 7s ease-in-out 1.8s infinite;
    }

    .content::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 52%;
      width: min(980px, 82vw);
      height: min(520px, 54vh);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(circle at 50% 50%, rgba(108, 206, 245, 0.34) 0%, rgba(108, 206, 245, 0.12) 46%, rgba(108, 206, 245, 0) 72%),
        radial-gradient(circle at 58% 44%, rgba(236, 120, 171, 0.26) 0%, rgba(236, 120, 171, 0.09) 44%, rgba(236, 120, 171, 0) 70%);
      filter: blur(1.2px);
    }

    .logo-mark {
      width: 300px;
      margin: 0 auto 14px;
      opacity: 0;
      filter: drop-shadow(0 8px 14px rgba(33, 126, 170, 0.2));
      animation:
        fadeRise 1.15s ease-out 0.06s forwards,
        logoBob 6.2s ease-in-out 1.6s infinite;
    }

    .logo-mark img {
      width: 100%;
      height: auto;
      display: block;
    }

    .headline {
      margin: 18px 0 0;
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: 220px;
      line-height: 0.95;
      letter-spacing: 0.035em;
      color: #144462;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0;
      text-shadow:
        0 0 1px rgba(255, 255, 255, 0.94),
        0 12px 30px rgba(22, 90, 124, 0.18),
        0 0 34px var(--glow-blue),
        0 0 18px rgba(236, 120, 171, 0.22);
      animation:
        fadeRise 1.35s cubic-bezier(0.2, 0.7, 0.1, 1) 0.4s forwards,
        headingGlow 5.2s ease-in-out 2.1s infinite,
        headlineFloat 6.6s ease-in-out 2s infinite;
    }

    .divider {
      width: 700px;
      max-width: 58%;
      height: 1px;
      margin: 34px auto 0;
      background: linear-gradient(
        90deg,
        rgba(40, 164, 216, 0) 0%,
        rgba(40, 164, 216, 0.78) 22%,
        rgba(234, 91, 151, 0.62) 50%,
        rgba(40, 164, 216, 0.78) 78%,
        rgba(40, 164, 216, 0) 100%
      );
      background-size: 220% 100%;
      opacity: 0;
      animation:
        fadeRise 1.2s ease-out 0.72s forwards,
        dividerSweep 7.2s ease-in-out 2s infinite;
    }

    .subcopy {
      margin-top: 24px;
      font-size: 20px;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      color: var(--ink-soft);
      opacity: 0;
      animation: fadeRise 1.2s ease-out 0.95s forwards;
    }

    .logo-floaters {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .logo-floater {
      position: absolute;
      width: 88px;
      opacity: 0;
      transform-origin: center center;
      will-change: transform, opacity;
      animation: batchFloat 5s ease-in-out forwards;
      padding: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .logo-floater img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 0;
      background: transparent;
      filter: drop-shadow(0 4px 10px rgba(18, 59, 82, 0.2));
    }

    @keyframes fadeRise {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes headingGlow {
      0%,
      100% {
        text-shadow:
          0 0 1px rgba(255, 255, 255, 0.9),
          0 11px 30px rgba(22, 90, 124, 0.18),
          0 0 30px var(--glow-blue),
          0 0 14px rgba(236, 120, 171, 0.2);
      }
      50% {
        text-shadow:
          0 0 1px rgba(255, 255, 255, 0.95),
          0 14px 34px rgba(22, 90, 124, 0.2),
          0 0 40px var(--glow-blue),
          0 0 28px var(--glow-pink);
      }
    }

    @keyframes headlineFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes contentFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-14px);
      }
    }

    @keyframes logoBob {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes dividerSweep {
      0%,
      100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes batchFloat {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(0deg) scale(0.92);
      }
      12% {
        opacity: 1;
      }
      52% {
        opacity: 1;
        transform: translate(var(--dx1, 0px), var(--dy1, 0px)) rotate(var(--r1, 0deg)) scale(1.02);
      }
      86% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx2, 0px), var(--dy2, 0px)) rotate(var(--r2, 0deg)) scale(0.94);
      }
    }

  </style>
</head>
<body>
  <div class="viewport">
  <main class="screen" id="screen" aria-label="ICE CREAM LABS coming soon welcome signage">
    <div class="logo-floaters" id="logoFloaters" aria-hidden="true"></div>

    <section class="content">
      <div class="logo-mark">
        <img src="images/ice cream labs logo.png" alt="ICE CREAM LABS logo">
      </div>
      <h1 class="headline">Coming Soon</h1>
      <div class="divider" aria-hidden="true"></div>
      <p class="subcopy">Preparing our signature menu board experience</p>
    </section>
  </main>
  </div>

  <script>
    // Keep a strict 1920x1080 design surface and scale it to any display.
    (function () {
      const screen = document.getElementById("screen");
      const logoFloaters = document.getElementById("logoFloaters");
      const content = screen ? screen.querySelector(".content") : null;
      if (!screen) return;
      if (!logoFloaters || !content) return;

      const designWidth = 1920;
      const designHeight = 1080;

      // 12 product images split into 3 batches of 4 (one per quadrant)
      var imageBatches = [
        [
          "images/cone-removebg-preview.png",
          "images/bubbletea-removebg-preview.png",
          "images/scoops-removebg-preview.png",
          "images/strawberry-removebg-preview.png"
        ],
        [
          "images/delicious-chocolate-brownie-ice-cream-sundae-dessert-removebg-preview.png",
          "images/bubbletea2-removebg-preview.png",
          "images/falooda-white-background_679658-3663-removebg-preview.png",
          "images/juice-removebg-preview.png"
        ],
        [
          "images/delicious-raspberry-chocolate-ice-cream-sundae-removebg-preview.png",
          "images/thickshake-removebg-preview.png",
          "images/png-clipart-ice-cream-milkshake-sundae-banana-removebg-preview.png",
          "images/pngtree-falooda-drink-beverage-isolated-on-transparent-background-png-image-removebg-preview.png"
        ]
      ];
      var currentBatchIndex = 0;

      function fitStage() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / designWidth, vh / designHeight);

        const offsetX = (vw - designWidth * scale) / 2;
        const offsetY = (vh - designHeight * scale) / 2;

        screen.style.transform = "translate(" + offsetX + "px, " + offsetY + "px) scale(" + scale + ")";
      }

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      // 16 curated spawn points — 4 per quadrant, hand-picked for a
      // balanced, premium look that avoids logo / headline / subcopy.
      // q: 0 = top-left, 1 = top-right, 2 = bottom-left, 3 = bottom-right
      var spawnPoints = [
        // ── Q0  top-left ──
        { x:  70,  y:  45,  q: 0 },   // upper-left corner
        { x: 260,  y: 160,  q: 0 },   // inset diagonally
        { x:  50,  y: 400,  q: 0 },   // left edge, mid-height
        { x: 480,  y:  40,  q: 0 },   // top strip, left of logo
        // ── Q1  top-right ──
        { x: 1730, y:  55,  q: 1 },   // upper-right corner
        { x: 1650, y: 190,  q: 1 },   // inset from right
        { x: 1700, y: 400,  q: 1 },   // right edge, mid-height
        { x: 1300, y:  35,  q: 1 },   // top strip, right of logo
        // ── Q2  bottom-left ──
        { x:  70,  y: 810,  q: 2 },   // lower-left corner
        { x: 250,  y: 940,  q: 2 },   // inset from bottom-left
        { x:  55,  y: 590,  q: 2 },   // left edge, just below centre
        { x: 380,  y: 850,  q: 2 },   // lower-left inner
        // ── Q3  bottom-right ──
        { x: 1730, y: 810,  q: 3 },   // lower-right corner
        { x: 1580, y: 940,  q: 3 },   // inset from bottom-right
        { x: 1700, y: 590,  q: 3 },   // right edge, just below centre
        { x: 1280, y: 880,  q: 3 }    // lower-right inner
      ];

      // Group points by quadrant for quick lookup
      var pointsByQ = [[], [], [], []];
      spawnPoints.forEach(function (p) { pointsByQ[p.q].push(p); });

      // Track last-used index per quadrant so consecutive batches differ
      var lastUsed = [-1, -1, -1, -1];

      function pickPoint(q) {
        var pool = pointsByQ[q];
        var idx;
        do {
          idx = Math.floor(Math.random() * pool.length);
        } while (pool.length > 1 && idx === lastUsed[q]);
        lastUsed[q] = idx;
        var p = pool[idx];
        // Add subtle jitter (±12 px) so it never feels robotic
        return { x: p.x + rand(-12, 12), y: p.y + rand(-12, 12) };
      }

      function spawnBatch() {
        logoFloaters.textContent = "";
        var images = imageBatches[currentBatchIndex];
        // One image per quadrant → always 4 images, all quadrants filled
        for (var q = 0; q < 4; q++) {
          var pt = pickPoint(q);
          var size = Math.round(rand(120, 160));

          var floater = document.createElement("span");
          floater.className = "logo-floater";
          floater.style.width = size + "px";
          floater.style.left = Math.round(pt.x) + "px";
          floater.style.top  = Math.round(pt.y) + "px";
          floater.style.setProperty("--dx1", rand(-16, 16).toFixed(1) + "px");
          floater.style.setProperty("--dy1", rand(-14, 14).toFixed(1) + "px");
          floater.style.setProperty("--dx2", rand(-18, 18).toFixed(1) + "px");
          floater.style.setProperty("--dy2", rand(-16, 16).toFixed(1) + "px");
          floater.style.setProperty("--r1", rand(-3.5, 3.5).toFixed(2) + "deg");
          floater.style.setProperty("--r2", rand(-4, 4).toFixed(2) + "deg");

          var img = document.createElement("img");
          img.src = images[q];
          img.alt = "";
          floater.appendChild(img);
          logoFloaters.appendChild(floater);
        }
      }

      function runBatchCycle() {
        spawnBatch();
        currentBatchIndex = (currentBatchIndex + 1) % imageBatches.length;

        setTimeout(function () {
          logoFloaters.textContent = "";

          setTimeout(function () {
            runBatchCycle();
          }, 2000);
        }, 5000);
      }

      window.addEventListener("resize", fitStage);
      fitStage();
      runBatchCycle();
    })();
  </script>
</body>
</html>
